name: Deploy to CT 100

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Write deploy version
        run: |
          echo "${{ github.sha }} ${{ github.event.head_commit.message }}" > deploy_version.txt
          pct push 100 deploy_version.txt /root/hk_bot/deploy_version.txt

      - name: Sync src to CT 100
        run: |
          find src -name "*.py" | while read f; do
            dir=$(dirname "$f")
            pct exec 100 -- mkdir -p /root/hk_bot/$dir
            pct push 100 "$f" /root/hk_bot/$f
          done
          pct push 100 requirements.txt /root/hk_bot/requirements.txt
          pct exec 100 -- pip3 install -q -r /root/hk_bot/requirements.txt
          pct push 100 config.json /root/hk_bot/config.json

      - name: Restart bot
        run: pct exec 100 -- systemctl restart hk-bot

      - name: Verify bot is running
        run: |
          for i in $(seq 1 5); do
            sleep 3
            status=$(pct exec 100 -- systemctl is-active hk-bot)
            [ "$status" = "active" ] && exit 0
            echo "Attempt $i: $status"
          done
          echo "Service did not become active"; exit 1
